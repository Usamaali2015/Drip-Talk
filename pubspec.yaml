name: drip_talk
description: "Your Personal AI Stylist That Remembers Your Taste – Chat, Get Inspired, Shop Smart"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  country_code_picker: ^3.4.1
  go_router: ^17.1.0
  dio: ^5.9.1
  intl: ^0.20.2
  get_it: ^9.2.1
  internet_connection_checker: ^3.0.1
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^10.0.0
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.8
  flutter_localizations:
    sdk: flutter
  carousel_slider: ^5.1.2
  flutter_svg: ^2.2.3
  change_app_package_name: ^1.5.0
  image_picker: ^1.2.1
  permission_handler: ^11.3.1
  shimmer: ^3.0.0
  flutter_html: ^3.0.0
  url_launcher: ^6.3.2
  local_auth: ^2.3.0
  font_awesome_flutter: ^10.12.0
  flex_color_picker: ^3.8.0
  uni_country_city_picker: ^1.0.2
  google_mlkit_face_detection: ^0.13.2
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/lotties/
    - assets/logo/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins.ttf

    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal.ttf

    - family: RedHatDisplay
      fonts:
        - asset: assets/fonts/RedHatDisplay-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/app_logo.png"
  remove_alpha_ios: true
