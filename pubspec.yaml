name: drip_talk
description: "Your Personal AI Stylist That Remembers Your Taste – Chat,
Get Inspired, Shop Smart"

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  country_code_picker: ^3.4.1
  go_router: ^17.1.0
  dio: ^5.9.1
  intl: ^0.20.2
  get_it: ^9.2.1
  internet_connection_checker: ^3.0.1
  cached_network_image: ^3.4.1
  flutter_secure_storage: ^10.0.0
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.8
  flutter_localizations:
    sdk: flutter
  carousel_slider: ^5.1.2
  video_player: ^2.11.0
  flutter_svg: ^2.2.3
  change_app_package_name: ^1.5.0
  image_picker: ^1.2.1
  skeletonizer: ^2.1.3
  shimmer: ^3.0.0
  flutter_html: ^3.0.0
  url_launcher: ^6.3.2



dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0



flutter:
  generate: true
  uses-material-design: true


  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/lotties/



  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins.ttf
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal.ttf
    - family: RedHatDisplay
      fonts:
        - asset: assets/fonts/RedHatDisplay-Regular.ttf

